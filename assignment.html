

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Login</title>
    <style>
        h1 {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        form {
             /* display: flex; 
            justify-content: center;
            align-items: center; */
            gap: 10px;
            margin-top: 20px;
        }
        input {
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            padding: 5px;
            
            
        }
        button {
            color: black;
            padding: 5px 10px;
        }
        p {
            text-align: center;
            color: green;

        .login{
               display: flex; 
            justify-content: center;

            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Log In</h1>

    

    <form id="form">
    <div class="log in">
            <div>
            <label for="">Name</label>
            <input class="" id="name" type="text" placeholder="Enter your name" required>

        </div> <br>
        <div>
            <label>Email</label>
            <input id="email" type="email" placeholder="Enter email" required>
        </div> <br>
        <div>
            <label for="">Password</label>
            <input id="password" type="password" placeholder="Enter password" required>
        </div>

        <div>
            <button id="signup" type="submit">Sign Up</button>
        </div>

    </div>
        
    </form>



    <p id="message"></p>
     <p id="messages"></p>

    <script>

        let signUpData = [
            { id: 1, title: "Name" },
            { id: 2, title: "Email" },
            { id: 3, title: "Password" }
        ];

        document.getElementById("form").addEventListener("submit", function(event) {
            event.preventDefault();

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            document.getElementById("message").innerText = "Account is created successfully!";
           
              
        });

         if (name ==="" || email ==="" || password === "") {
            
            document.getElementById("messages").innerText = "Account already exist";
            return;
           }


        
      

    </script>

</body>
</html>
