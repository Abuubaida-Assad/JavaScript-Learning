<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <h1 class="text-center text-2xl font-bold mt-10">Sign up</h1>
    <form id="form" class="flex justify-center ">
        <div class="flex flex-col gap-3 mt-6">
            <div class="">
                <label for="Name">Name</label><br>
                <input id="name" type="text" placeholder="Enter your name" class="border p-2 w-56 rounded">
            </div>
            <div>
                <label for="email">Email</label><br>
                <input id="email" type="email" placeholder="Enter email" class="border p-2 w-56 rounded">
            </div>
            <div>
                <label for="password">Password</label><br>
                <input id="password" type="password" placeholder="Enter password" class="border p-2 w-56 rounded">
            </div>
            <div>
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Sign up</button>
            </div>
        </div>
    </form>
    <p id="message" class="text-center text-green-600 mt-4"></p>
    <p id="error" class="text-center text-red-600"></p>

    <script>
        let users =[
            {id:1,name:"jack",email:"jack@mail.com"},
            {id:2,name:"max",email:'max@gmail.com'}
        ];

        document.getElementById("form").addEventListener("submit",function(event){
        event.preventDefault();
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        if(name===""|| email==="" || password===""){
        document.getElementById("error").innerText="All Fields are required";
        document.getElementById("message").innerHTML="";
        return;
        }

        for(let i=0;i<users.length;i++){
            if(users[i].email===email){
             document.getElementById("error").innerText="email already exist"
             document.getElementById("message").innerText=""
             return;
            }
        }


        users.push({
        id:users.length+1,
        name:name,
        email:email
        });

        document.getElementById("message").innerText="Account is created successfully";
        document.getElementById("error").innerText="";
        document.getElementById("form").reset();
        console.log(users);

        }
    );
    </script>
</body>
</html>
