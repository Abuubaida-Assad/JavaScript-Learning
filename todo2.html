<script>
    var todos = [
        { id: 1, text: "todo-1" },
        { id: 2, text: "todo-2" }
    ];

    function showTodos() {
        var html = "";

        for (var i = 0; i < todos.length; i++) {
            html += `
                <div class="todo">
                    <span>${todos[i].text}</span>
                    <button class="delete-btn" onclick="deleteTodo(${todos[i].id})">
                        Delete
                    </button>
                </div>
            `;
        }

        document.getElementById("list").innerHTML = html;
    }

    function addTodo() {
        var text = document.getElementById("input").value.trim();
        if (text === "") return;

        
        var newId = 1;

        for (var i = 0; i < todos.length; i++) {
            if (todos[i].id >= newId) {
                newId = todos[i].id + 1;
            }
        }

        todos.push({ id: newId, text: text });

        document.getElementById("input").value = "";
        showTodos();
    }

    function deleteTodo(todoId) {
        var newTodos = [];

        for (var i = 0; i < todos.length; i++) {
            if (todos[i].id !== todoId) {
                newTodos.push(todos[i]);
            }
        }

        todos = newTodos;
        showTodos();
    }

    showTodos();
</script>
