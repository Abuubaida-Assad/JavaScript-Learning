    <script>
        function isValidDominoChain(dominoes) {
 
  for (let i=0;i<dominoes.length-1;i++){
    
    let currentsecond = dominoes[i][1];
    
    let nextFrist = dominoes[i+1][0];
    if(currentsecond !== nextFrist){
    return false;
  }
  }
  
  return true;
}

console.log(isValidDominoChain([[1, 3], [3, 6], [6, 5]]))
    </script>
    
</body>
